<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Flip the coin | devChallenges.io</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background-color:  #4B3E8A;

      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(173, 183, 200);
      }

      .author-info a {
        text-decoration: none;
      }
      .title {
        color: white;
        text-align: center;
      }
      .title h1{
        -webkit-text-stroke: 5px #35383f;
        text-shadow: 2px 2px 0px #35383f;
        font-size: 100px;
        margin-top: 10px;
        margin-bottom: 10px;
      }
      .title h3{
        margin-top: 15px;
      }
      .imagenes {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

      }
      .button-action h5{
        color: white;
        font-size: 25px;
        margin-top: 15px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin-bottom: 25px;
        margin-left: 12px;
      }
      .button-action button{
        background-color: #005BD6;
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 8px;
        cursor:pointer;
        box-shadow: 0px 3px 0px 0px #002B66;
      }

    </style>
  </head>
  <body>
    <!-- 

    Flip a Coin Game
    Press the coin or the button to flip the coin
    Head
    Tail
    Random
  
    -->
    <div class="title">
      <h1>Flip the coin</h1>
      <h3>Press the coin or the button to flip the coin</h3>
    </div>
    <div class="imagenes">
      <div class="imagen-head">
        <img src="./resources/heads.svg" alt="heads">
        <br>
      </div>
      <div class="imagen-tail">
        <img src="./resources/tails.svg" alt="heads">
        <br>
      </div>
      <div class="shadow">
        <img src="./resources/shadow.svg" alt="heads">
      </div>
      
      
      <div class="button-action">
        <h5>Moneda</h5>
        <button type="button">RANDOM</button>
      </div>
    </div>
    <div class="author-info">
      Coded by <a href="#">Samuel Alegre</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </div>
  </body>
</html>

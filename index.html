<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Flip the coin | devChallenges.io</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background-color:  #35383f;
      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
      }

      .author-info a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <!-- 

    Flip a Coin Game
    Press the coin or the button to flip the coin
    Head
    Tail
    Random
  
    -->
    <div class="title">
      <h1>Flip the coin</h1>
      <h3>Press the coin or the button to flip the coin</h3>
    </div>
    <div class="imagenes">
      <div class="imagen-head">
        <img src="./resources/heads.svg" alt="heads">
        <br>
        <img src="./resources/shadow.svg" alt="heads">
      </div>
      <div class="imagen-tails">
        <img src="./resources/tails.svg" alt="heads">
        <br>
        <img src="./resources/shadow.svg" alt="heads">
      </div>
      <h5>Moneda</h5>
      <div class="button-action">
        <button type="button">RANDOM</button>
      </div>
    </div>
    <div class="author-info">
      Coded by <a href="#">Samuel Alegre</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </div>
  </body>
</html>

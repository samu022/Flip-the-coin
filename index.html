<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Flip the coin | devChallenges.io</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style>

      body {
        margin: 0px;
        font-family: sans-serif;

      }
      .app{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #4B3E8A;
      }
      .card {
        text-align: center;
      }
      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(173, 183, 200);
      }

      .author-info a {
        text-decoration: none;
      }
      .title {
        color: white;
        text-align: center;
      }
      .title h1{
        font-size: 50px;
        -webkit-text-stroke: 2px #35383f;
        text-shadow: 2px 2px 0px #35383f;
     
      }
      .title h3{
        margin-top: 10px;
      }
      .imagenes {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 20px;

      }
      .button-action h5{
        color: white;
        font-size: 25px;
        margin-top: 15px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin-bottom: 25px;
        text-align: center;
      }
      .button-action button{
        background-color: #005BD6;
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 8px;
        cursor:pointer;
        box-shadow: 0px 3px 0px 0px #002B66;
      }
      button:hover {
        transform: scale(1.05);
      }

      button:active {
        transform: scale(0.95);
      }

    </style>
  </head>
  <body>
    <div class="app">
      <div class="card">
        <div class="title">
          <h1>Flip the coin</h1>
          <h3>Press the coin or the button to flip the coin</h3>
        </div>
        <div class="imagenes">
          <div class="imagen-coin">
            <img src="./resources/heads.svg" alt="Imagen head">
            <br>
          </div>
          <div class="shadow">
            <img src="./resources/shadow.svg" alt="heads">
          </div>
          
          
          <div class="button-action">
            <h5>Heads</h5>
            <button type="button">RANDOM</button>
          </div>
        </div>
        <div class="author-info">
          Coded by <a href="#">Samuel Alegre</a> | Challenge by
          <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
            >devChallenges.io</a
          >.
        </div>
      </div>
    </div>
    
    <script>
      const button = document.querySelector('.button-action');
      button.addEventListener("click", function(){
          const result = Math.random() < 0.5 ? "Heads" : "Tails";
          
          let img_element = document.querySelector(".imagen-coin img");
          let texto=document.querySelector(".button-action h5");
          if(result=="Heads"){
            img_element.src="./resources/heads.svg";
            img_element.alt="Imagen head moneda";
            texto.innerHTML="Heads";
          }else{
            img_element.src="./resources/tails.svg";
            img_element.alt="Imagen tail moneda";
            texto.innerHTML="Tails";
          }
          
          
          
        }
      );
    </script>
  </body>
</html>
